<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성역 신청 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; position: relative; min-height: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
        
        /* 로딩 오버레이 보강 */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; font-weight: bold; color: #007bff;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .account-switcher-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; }
        .switcher-label { font-size: 12px; font-weight: bold; color: #495057; }
        #account-selector { width: auto; padding: 5px; margin: 0; font-size: 13px; border-radius: 4px; }
        #welcome-msg { color: #007bff; text-align: center; font-weight: bold; margin: 10px 0; }
        .history-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        .no-data { color: #999; text-align: center; padding: 20px; }
        .btn-cancel { background: #dc3545; padding: 5px 10px; font-size: 12px; width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">처리 중...</p>
    </div>

    <div id="login-section">
        <h2>성역 신청 로그인1</h2>
        <input type="text" id="userId" placeholder="아이디">
        <input type="password" id="userPw" placeholder="비밀번호">
        <div style="font-size: 14px; margin-bottom: 10px;">
            <input type="checkbox" id="rememberMe" checked style="width: auto; margin-right: 5px;">
            <label for="rememberMe">이 계정 기억하기</label>
        </div>
        <button id="login-btn" onclick="login()">접속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="account-switcher-bar">
            <span class="switcher-label">계정 전환 🔄</span>
            <select id="account-selector" onchange="switchAccount(this.value)"></select>
        </div>
        <p id="welcome-msg"></p>
        <div class="apply-box">
            <label style="font-weight: bold;">[유적 신청]</label>
            <select id="relic-select">
                <option value="경복궁">경복궁</option>
                <option value="불국사">불국사</option>
                <option value="석굴암">석굴암</option>
                <option value="첨성대">첨성대</option>
            </select>
            <button id="submit-btn" onclick="submitData()">신청 완료</button>
        </div>
        <div class="history-section">
            <h3 style="font-size: 16px; margin-bottom: 5px;">📍 나의 신청 기록</h3>
            <table>
                <thead><tr><th>번호</th><th>유적</th><th>시간</th><th>순서</th><th>관리</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
            <div id="no-history" class="no-data hidden">신청 내역이 없습니다.</div>
        </div>
        <button onclick="logout()" style="background:#6c757d; margin-top:20px; font-size:14px;">새 계정 로그인 (로그아웃)</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuaVNjfRWn--DpSqLbpCf8BlQekl-de0DhNlwSdQuIUsZ5rojWrRWtlLxYTduk8G373g/exec";
    let currentUserId = "";
    let currentUserNick = ""; 

    window.addEventListener('DOMContentLoaded', () => {
        const lastUser = JSON.parse(localStorage.getItem("lastLoginUser"));
        if (lastUser) {
            document.getElementById("userId").value = lastUser.id;
            document.getElementById("userPw").value = lastUser.pw;
            login(true); 
        }
    });

    function showLoading(text) {
        document.getElementById("loading-text").innerText = text;
        document.getElementById("loading-overlay").classList.remove("hidden");
    }

    function hideLoading() {
        document.getElementById("loading-overlay").classList.add("hidden");
    }

    function refreshAccountSelector() {
        const accounts = JSON.parse(localStorage.getItem("accountList") || "[]");
        const selector = document.getElementById("account-selector");
        selector.innerHTML = ""; 
        accounts.forEach(acc => {
            const option = document.createElement("option");
            option.value = acc.id;
            option.text = acc.nick;
            if (acc.id === currentUserId) option.selected = true;
            selector.appendChild(option);
        });
        const addOption = document.createElement("option");
        addOption.value = "ADD_NEW";
        addOption.text = "+ 새 계정 추가";
        selector.appendChild(addOption);
    }

    async function switchAccount(val) {
        if (val === "ADD_NEW") { logout(); return; }
        const accounts = JSON.parse(localStorage.getItem("accountList") || "[]");
        const target = accounts.find(a => a.id === val);
        if (target) {
            document.getElementById("userId").value = target.id;
            document.getElementById("userPw").value = target.pw;
            await login(false, true); // 스위칭 플래그 전달
        }
    }

    async function login(isAuto = false, isSwitching = false) {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        if(!id || !pw) return;

        // 자동 로그인이 아닐 때만 로딩 표시
        if(!isAuto) showLoading(isSwitching ? "계정 전환 중..." : "로그인 중...");

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ type: "login", userId: id, password: pw })
            });
            const data = await res.json();

            if (data.result === "success") {
                let accounts = JSON.parse(localStorage.getItem("accountList") || "[]");
                accounts = accounts.filter(a => a.id !== id);
                accounts.push({ id: id, pw: pw, nick: data.nick });
                localStorage.setItem("accountList", JSON.stringify(accounts));
                localStorage.setItem("lastLoginUser", JSON.stringify({ id: id, pw: pw }));

                currentUserId = id;
                currentUserNick = data.nick;
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "⚔️ " + currentUserNick + "님 접속 중";
                
                refreshAccountSelector();
                renderHistory(data.history);
                if (isSwitching) alert(`✅ ${currentUserNick} 계정으로 전환되었습니다.`);
            } else {
                alert("인증에 실패했습니다.");
                if(isAuto) logout();
            }
        } catch (e) {
            alert("서버 통신 중 오류가 발생했습니다.");
        } finally {
            hideLoading(); // 어떤 경우에도 로딩 창 닫기 보장
        }
    }

    function logout() {
        localStorage.removeItem("lastLoginUser");
        location.reload();
    }

    function renderHistory(history) {
        const tbody = document.getElementById('history-body');
        const noData = document.getElementById('no-history');
        tbody.innerHTML = "";
        if (!history || history.length === 0) {
            noData.classList.remove('hidden'); return;
        }
        noData.classList.add('hidden');
        history.forEach(item => {
            const row = `<tr>
                <td>${item.num}</td><td>${item.relic}</td><td>${item.time}</td><td>${item.order || '-'}</td>
                <td><button class="btn-cancel" onclick="deleteData()">취소</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    async function submitData() {
        const relic = document.getElementById('relic-select').value;
        showLoading("신청 처리 중...");
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ type: "submit", userId: currentUserId, nick: currentUserNick, relic: relic })
            });
            const data = await res.json();
            if (data.result === "success") { 
                alert("✅ 신청 완료!"); 
                await login(true); // 데이터 갱신을 위해 조용히 로그인 호출
            } else if (data.result === "duplicated") {
                alert("⚠️ 이미 신청한 내역이 있습니다.");
            }
        } catch (e) { alert("통신 오류"); } 
        finally { hideLoading(); }
    }

    async function deleteData() {
        if (!confirm("정말로 신청을 취소하시겠습니까?")) return;
        showLoading("취소 처리 중...");
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ type: "delete", nick: currentUserNick })
            });
            const data = await res.json();
            if (data.result === "success") { 
                alert("🗑️ 취소 완료!"); 
                await login(true); 
            }
        } catch (e) { alert("통신 오류"); }
        finally { hideLoading(); }
    }
</script>
</body>
</html>
