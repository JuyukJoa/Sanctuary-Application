<div id="login-section">
    <h2>Sanctuary Login</h2>
    <input type="text" id="userId" placeholder="아이디 입력">
    <input type="password" id="userPw" placeholder="비밀번호 입력">
    <button onclick="login()">접속하기</button>
</div>

<div id="main-section" class="hidden">
    <h3 id="welcome-msg" style="color:#007bff;"></h3>
    <p>신청하실 유적을 선택해주세요.</p>
    <select id="relic-select">
        <option value="경복궁">경복궁</option>
        <option value="불국사">불국사</option>
        <option value="석굴암">석굴암</option>
    </select>
    <button id="submit-btn" onclick="submitData()">신청하기</button>
</div>
