<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성역 신청 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
        #welcome-msg { color: #007bff; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>성역 신청 로그인</h2>
        <input type="text" id="userId" placeholder="아이디">
        <input type="password" id="userPw" placeholder="비밀번호">
        <button id="login-btn" onclick="login()">접속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <p id="welcome-msg"></p>
        <hr>
        <label>신청할 유적 종류:</label>
        <select id="relic-select">
            <option value="경복궁">경복궁</option>
            <option value="불국사">불국사</option>
            <option value="석굴암">석굴암</option>
            <option value="첨성대">첨성대</option>
        </select>
        <button id="submit-btn" onclick="submitData()">신청 완료</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuaVNjfRWn--DpSqLbpCf8BlQekl-de0DhNlwSdQuIUsZ5rojWrRWtlLxYTduk8G373g/exec";
    let currentUserId = "";
    let currentUserNick = ""; 

    async function login() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        const btn = document.getElementById('login-btn');

        if(!id || !pw) return alert("정보를 입력하세요.");
        btn.disabled = true;
        btn.innerText = "확인 중...";

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ type: "login", userId: id, password: pw })
            });
            const data = await res.json();

            if (data.result === "success") {
                currentUserId = id;
                currentUserNick = data.nick;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "⚔️ " + currentUserNick + "님 접속 중";
            } else {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            }
        } catch (e) {
            alert("연결 오류가 발생했습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "접속하기";
        }
    }

    async function submitData() {
        const relic = document.getElementById('relic-select').value;
        const btn = document.getElementById('submit-btn');

        if (!confirm("[" + relic + "] 신청하시겠습니까?")) return;

        btn.disabled = true;
        btn.innerText = "신청 데이터 전송 중...";

        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    type: "submit", 
                    userId: currentUserId, 
                    nick: currentUserNick, 
                    relic: relic 
                })
            });
            alert("성공적으로 신청되었습니다!");
        } catch (e) {
            alert("신청 중 오류가 발생했습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "신청 완료";
        }
    }
</script>

</body>
</html>
